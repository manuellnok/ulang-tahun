<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SELAMAT NAIK PANGKAT BOCIL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            background: pink;
            overflow: hidden;
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
            color: white;
        }

        p {
            font-size: 20px;
            color: white;
        }

        .emoji {
            font-size: 30px;
            margin-top: 20px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>
<body>

    <h1>NAIK PANGKAT MKO KANDA</h1>
    <h1>kukirim ini pas jam 12 malam</h1>
    <h2>jakko kasi tau siapa siapa tentang ini</h2>
    <p>PENCET SATU KALI KLO MAUKO DENGAR SOUND EFFECT</p>

    <div class="emoji">
        🥳🥳🥳🥳🥳🥳🥳🥳 <br>
        🎉🎉🎉🎉🎉🎉
    </div>

    <!-- Audio -->
    <audio id="music" autoplay loop>
        <source src="happybirthday.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Fix autoplay (karena browser suka sok aturan)
        document.addEventListener("click", () => {
            document.getElementById("music").play();
        });

        function createConfetti() {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");
            confetti.style.left = Math.random() * window.innerWidth + "px";
            confetti.style.backgroundColor =
                ["red", "blue", "yellow", "green", "purple"][Math.floor(Math.random()*5)];
            confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 5000);
        }

        setInterval(createConfetti, 100);
    </script>

</body>
</html>
